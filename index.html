<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>retro pixel art space game</title>
  <meta name="description" content="retro pixel art space game" />
  <style>
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; background: #000; } #gameContainer { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #000428 0%, #004e92 100%); } #gameCanvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: -moz-crisp-edges; image-rendering: crisp-edges; } #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; color: #00ff00; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 0px #004400; z-index: 10; } #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: #00ff00; padding: 40px; border: 3px solid #00ff00; text-align: center; font-size: 24px; z-index: 20; } #gameOver h2 { margin-bottom: 20px; color: #ff0040; text-shadow: 2px 2px 0px #400010; } #gameOver button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-size: 18px; font-family: 'Courier New', monospace; cursor: pointer; margin-top: 20px; } #gameOver button:hover { background: #40ff40; } .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="gameContainer"><canvas id="gameCanvas"></canvas><div id="ui"><div id="score">SCORE: 0</div><div id="lives">LIVES: 3</div><div id="gameOver" class="hidden"><h2>GAME OVER</h2><p>Final Score: <span id="finalScore">0</span></p><button onclick="game.restart()">PLAY AGAIN</button></div></div></div>
<script>
class Game { constructor() { this.canvas = document.getElementById('gameCanvas'); this.ctx = this.canvas.getContext('2d'); this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; this.player = { x: this.canvas.width / 2, y: this.canvas.height - 60, width: 32, height: 32, speed: 5, color: '#00ff00' }; this.bullets = []; this.enemies = []; this.stars = []; this.score = 0; this.lives = 3; this.gameRunning = true; this.keys = {}; this.enemySpawnTimer = 0; this.enemySpawnRate = 60; this.init(); } init() { this.createStars(); this.bindEvents(); this.gameLoop(); } createStars() { for (let i = 0; i < 100; i++) { this.stars.push({ x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height, speed: Math.random() * 2 + 1, size: Math.random() * 2 + 1 }); } } bindEvents() { document.addEventListener('keydown', (e) => { this.keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); this.shoot(); } }); document.addEventListener('keyup', (e) => { this.keys[e.code] = false; }); window.addEventListener('resize', () => { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }); } shoot() { if (this.gameRunning) { this.bullets.push({ x: this.player.x + this.player.width / 2 - 2, y: this.player.y, width: 4, height: 8, speed: 8, color: '#ffff00' }); } } spawnEnemy() { this.enemies.push({ x: Math.random() * (this.canvas.width - 24), y: -24, width: 24, height: 24, speed: 2 + Math.random() * 2, color: '#ff0040' }); } update() { if (!this.gameRunning) return; if (this.keys['ArrowLeft'] && this.player.x > 0) { this.player.x -= this.player.speed; } if (this.keys['ArrowRight'] && this.player.x < this.canvas.width - this.player.width) { this.player.x += this.player.speed; } if (this.keys['ArrowUp'] && this.player.y > 0) { this.player.y -= this.player.speed; } if (this.keys['ArrowDown'] && this.player.y < this.canvas.height - this.player.height) { this.player.y += this.player.speed; } this.bullets.forEach((bullet, index) => { bullet.y -= bullet.speed; if (bullet.y < -bullet.height) { this.bullets.splice(index, 1); } }); this.enemies.forEach((enemy, enemyIndex) => { enemy.y += enemy.speed; if (enemy.y > this.canvas.height) { this.enemies.splice(enemyIndex, 1); } this.bullets.forEach((bullet, bulletIndex) => { if (bullet.x < enemy.x + enemy.width && bullet.x + bullet.width > enemy.x && bullet.y < enemy.y + enemy.height && bullet.y + bullet.height > enemy.y) { this.enemies.splice(enemyIndex, 1); this.bullets.splice(bulletIndex, 1); this.score += 10; document.getElementById('score').textContent = 'SCORE: ' + this.score; } }); if (this.player.x < enemy.x + enemy.width && this.player.x + this.player.width > enemy.x && this.player.y < enemy.y + enemy.height && this.player.y + this.player.height > enemy.y) { this.enemies.splice(enemyIndex, 1); this.lives--; document.getElementById('lives').textContent = 'LIVES: ' + this.lives; if (this.lives <= 0) { this.gameOver(); } } }); this.stars.forEach(star => { star.y += star.speed; if (star.y > this.canvas.height) { star.y = 0; star.x = Math.random() * this.canvas.width; } }); this.enemySpawnTimer++; if (this.enemySpawnTimer >= this.enemySpawnRate) { this.spawnEnemy(); this.enemySpawnTimer = 0; if (this.enemySpawnRate > 20) this.enemySpawnRate--; } } render() { this.ctx.fillStyle = '#000'; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height); this.stars.forEach(star => { this.ctx.fillStyle = '#ffffff'; this.ctx.fillRect(star.x, star.y, star.size, star.size); }); this.ctx.fillStyle = this.player.color; this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height); this.ctx.fillStyle = '#004400'; this.ctx.fillRect(this.player.x + 4, this.player.y + 4, this.player.width - 8, this.player.height - 8); this.bullets.forEach(bullet => { this.ctx.fillStyle = bullet.color; this.ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height); }); this.enemies.forEach(enemy => { this.ctx.fillStyle = enemy.color; this.ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height); this.ctx.fillStyle = '#400010'; this.ctx.fillRect(enemy.x + 2, enemy.y + 2, enemy.width - 4, enemy.height - 4); }); } gameOver() { this.gameRunning = false; document.getElementById('finalScore').textContent = this.score; document.getElementById('gameOver').classList.remove('hidden'); } restart() { this.score = 0; this.lives = 3; this.gameRunning = true; this.bullets = []; this.enemies = []; this.enemySpawnTimer = 0; this.enemySpawnRate = 60; this.player.x = this.canvas.width / 2; this.player.y = this.canvas.height - 60; document.getElementById('score').textContent = 'SCORE: 0'; document.getElementById('lives').textContent = 'LIVES: 3'; document.getElementById('gameOver').classList.add('hidden'); } gameLoop() { this.update(); this.render(); requestAnimationFrame(() => this.gameLoop()); } } const game = new Game();
</script>
</body>
</html>
